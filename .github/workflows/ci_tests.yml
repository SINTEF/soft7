name: CI - Tests

on:
  pull_request:
  push:
    branches:
      - 'main'
      - 'push-action/**'  # For the CasperWA/push-protected action

jobs:
  basics:
    name: External
    uses: SINTEF/ci-cd/.github/workflows/ci_tests.yml@v2.9.2
    with:
      # General
      install_extras: '[dev]'

      # pre-commit
      run_pre-commit: false  # Uses pre-commit.ci (see config file .pre-commit-config.yaml)

      # pylint & safety
      run_pylint: false
      run_safety: false

      # Build Python package
      run_build_package: true
      python_version_package: '3.10'
      build_libs: flit
      build_cmd: flit build

      # Documentation
      run_build_docs: false

  pip-audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install -U pip
        pip install -U setuptools wheel
        pip install -U -r .github/utils/requirements_audit.txt

    - name: Prepare for pip-audit
      run: pip-compile --output-file="${{ runner.temp }}/requirements.txt" --all-extras --allow-unsafe --verbose --color "${{ github.workspace }}/pyproject.toml"

    - name: Run pip-audit
      uses: pypa/gh-action-pip-audit@v1.1.0
      with:
        inputs: '${{ runner.temp }}/requirements.txt'
        # CVE-2025-69872: DiskCache 5.6.3
        #   DiskCache (python-diskcache) through 5.6.3 uses Python pickle for serialization by default.
        #   An attacker with write access to the cache directory can achieve arbitrary code execution
        #   when a victim application reads from the cache.
        # CVE-2026-4539: pygments 2.19.2
        #   The impacted element is the function AdlLexer of the file pygments/lexers/archetype.py.
        #   The manipulation results in inefficient regular expression complexity. The attack is only
        #   possible with local access.
        ignore-vulns: |
          CVE-2025-69872
          CVE-2026-4539

  pytest:
    name: pytest
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Supported Python versions (according to pyproject.toml)
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install -U pip
        pip install -U setuptools wheel
        pip install -e .[testing]

    - name: Run pytest
      run: pytest -v -rs --cov=s7 --cov-report=xml --cov-report=term-missing --color=yes

    - name: Upload code coverage report
      if: github.repository == 'SINTEF/soft7'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true
        flags: pytest
        env_vars: PYTHON
      env:
        PYTHON: ${{ matrix.python-version }}
